<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对门</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            background: #000;
        }

        .logo-container {
            transition: transform 0.3s ease-out;
        }

        .logo {
            width: 300px;
            height: auto;
            filter: brightness(1);
        }

        .logo.shrunk {
            width: 80px;
        }

        /* Gallery Section */
        .gallery {
            position: relative;
            z-index: 20;
            background: #000;
            padding: 100vh 0 50px;
        }

        .gallery-item {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .gallery-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        .scroll-indicator svg {
            width: 30px;
            height: 30px;
            fill: #fff;
        }

        @media (max-width: 768px) {
            .logo {
                width: 200px;
            }

            .logo.shrunk {
                width: 60px;
            }

            .gallery {
                padding: 100vh 0 30px;
            }

            .gallery-item {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="logo-container" id="logoContainer">
            <img src="对门logo.svg" alt="对门" class="logo" id="logo">
        </div>
        <div class="scroll-indicator" id="scrollIndicator">
            <svg viewBox="0 0 24 24">
                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
            </svg>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery" id="gallery">
        <div class="gallery-item"><img src="1.png" alt="剧照 1"></div>
        <div class="gallery-item"><img src="2.png" alt="剧照 2"></div>
        <div class="gallery-item"><img src="3.png" alt="剧照 3"></div>
        <div class="gallery-item"><img src="4.png" alt="剧照 4"></div>
        <div class="gallery-item"><img src="5.png" alt="剧照 5"></div>
        <div class="gallery-item"><img src="6.png" alt="剧照 6"></div>
        <div class="gallery-item"><img src="7.png" alt="剧照 7"></div>
        <div class="gallery-item"><img src="8.png" alt="剧照 8"></div>
    </section>

    <script>
        const logo = document.getElementById('logo');
        const logoContainer = document.getElementById('logoContainer');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const galleryItems = document.querySelectorAll('.gallery-item');

        // Handle scroll for logo shrinking
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const viewportHeight = window.innerHeight;
            
            // Shrink logo based on scroll position
            if (scrollY > 50) {
                logo.classList.add('shrunk');
            } else {
                logo.classList.remove('shrunk');
            }

            // Hide scroll indicator
            if (scrollY > 100) {
                scrollIndicator.style.opacity = '0';
            } else {
                scrollIndicator.style.opacity = '0.5';
            }

            // Reveal gallery items on scroll
            galleryItems.forEach((item, index) => {
                const rect = item.getBoundingClientRect();
                const triggerPoint = viewportHeight * 0.8;
                
                if (rect.top < triggerPoint && rect.bottom > 0) {
                    setTimeout(() => {
                        item.classList.add('visible');
                    }, index * 50);
                }
            });
        });

        // Initial check for visible items
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
